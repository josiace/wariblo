{% extends 'base.html' %}

{% block title %}Delete Campaign - Wariblo{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body p-5">
                    <h2 class="mb-4">Delete Campaign</h2>
                    <p class="alert alert-warning">Are you sure you want to delete "{{ campaign.title }}"? This action cannot be undone.</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Delete Campaign</button>
                        <a href="{% url 'campaign_detail' campaign.pk %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
