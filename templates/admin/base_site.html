{% extends "admin/base_site.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'css/admin.css' %}">
<style>
/* Premium Admin Design */
:root {
    --primary: #FF6B35;
    --secondary: #004E89;
    --accent: #F7C59F;
    --success: #00C853;
    --warning: #FFAB00;
    --danger: #FF5252;
    --dark: #1A1A2E;
    --light: #FFFFFF;
    --gray-light: #F5F5F5;
    --gray-medium: #E0E0E0;
    --gray-dark: #757575;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

#container {
    background: var(--light);
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    margin: 30px auto;
    max-width: 1400px;
}

#header {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 16px 16px 0 0;
    padding: 25px 35px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
}

#header h1 {
    color: var(--light);
    font-size: 2.2rem;
    font-weight: 800;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

#header a {
    color: var(--light);
    text-decoration: none;
}

#user-tools {
    color: var(--light);
}

#user-tools a {
    color: var(--light);
    background: rgba(255, 255, 255, 0.15);
    padding: 8px 16px;
    border-radius: 20px;
    margin-left: 10px;
    transition: all 0.3s ease;
}

#user-tools a:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: translateY(-2px);
}

#nav-sidebar {
    background: var(--dark);
    border-radius: 0 0 0 16px;
}

#nav-sidebar a {
    color: var(--gray-medium);
    padding: 12px 20px;
    transition: all 0.3s ease;
    border-left: 3px solid transparent;
}

#nav-sidebar a:hover {
    color: var(--light);
    background: rgba(255, 255, 255, 0.05);
    border-left-color: var(--primary);
    padding-left: 25px;
}

#nav-sidebar a.current {
    color: var(--light);
    background: rgba(255, 107, 53, 0.2);
    border-left-color: var(--primary);
    font-weight: 600;
}

.module h2 {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: var(--light);
    padding: 15px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

#content {
    padding: 30px;
}

/* Table Styles */
#changelist table {
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

#changelist thead th {
    background: linear-gradient(135deg, var(--secondary), var(--primary));
    color: var(--light);
    font-weight: 600;
    padding: 15px;
}

#changelist tbody tr {
    transition: all 0.3s ease;
}

#changelist tbody tr:hover {
    background: var(--gray-light);
    transform: scale(1.01);
}

/* Button Styles */
.button, input[type=submit], input[type=button], .submit-row input {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: var(--light);
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
}

.button:hover, input[type=submit]:hover, input[type=button]:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
}

/* Form Styles */
.form-row {
    padding: 15px 0;
    border-bottom: 1px solid var(--gray-medium);
}

.form-row:last-child {
    border-bottom: none;
}

label {
    font-weight: 600;
    color: var(--dark);
}

input[type=text], input[type=password], input[type=email], 
input[type=url], input[type=number], input[type=tel], 
textarea, select {
    border: 2px solid var(--gray-medium);
    border-radius: 8px;
    padding: 12px;
    transition: all 0.3s ease;
    width: 100%;
}

input[type=text]:focus, input[type=password]:focus, 
input[type=email]:focus, input[type=url]:focus, 
input[type=number]:focus, input[type=tel]:focus, 
textarea:focus, select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
    outline: none;
}

/* Object Tools */
.object-tools {
    margin-bottom: 20px;
}

.object-tools a {
    background: linear-gradient(135deg, var(--secondary), var(--primary));
    color: var(--light);
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0, 78, 137, 0.3);
}

.object-tools a:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 78, 137, 0.4);
}

/* Breadcrumbs */
.breadcrumbs {
    background: var(--gray-light);
    padding: 15px 20px;
    border-radius: 8px;
    margin-bottom: 20px;
    border-left: 4px solid var(--primary);
}

.breadcrumbs a {
    color: var(--secondary);
    text-decoration: none;
    font-weight: 600;
}

.breadcrumbs a:hover {
    color: var(--primary);
}

/* Pagination */
.paginator {
    margin-top: 20px;
    padding: 15px;
    background: var(--gray-light);
    border-radius: 8px;
}

.paginator a {
    background: var(--light);
    color: var(--dark);
    padding: 8px 16px;
    border-radius: 6px;
    text-decoration: none;
    border: 2px solid var(--gray-medium);
    transition: all 0.3s ease;
}

.paginator a:hover {
    background: var(--primary);
    color: var(--light);
    border-color: var(--primary);
}

.paginator .this-page {
    background: var(--primary);
    color: var(--light);
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: 600;
}

/* Messages */
.messagelist {
    margin-bottom: 20px;
}

.messagelist li {
    padding: 15px 20px;
    border-radius: 8px;
    margin-bottom: 10px;
    font-weight: 600;
}

.messagelist li.success {
    background: linear-gradient(135deg, #00C853, #00E676);
    color: var(--light);
}

.messagelist li.warning {
    background: linear-gradient(135deg, #FFAB00, #FFCA28);
    color: var(--dark);
}

.messagelist li.error {
    background: linear-gradient(135deg, #FF5252, #FF1744);
    color: var(--light);
}

/* Stats Cards */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: linear-gradient(135deg, var(--light), var(--gray-light));
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
    border-left: 4px solid var(--primary);
}

.stat-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
}

.stat-card h3 {
    color: var(--gray-dark);
    font-size: 0.9rem;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.stat-card .value {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--primary);
    margin-bottom: 5px;
}

.stat-card .sub-value {
    color: var(--gray-dark);
    font-size: 0.85rem;
}

/* Responsive */
@media (max-width: 768px) {
    #container {
        margin: 10px;
        border-radius: 12px;
    }
    
    #header {
        padding: 20px;
        border-radius: 12px 12px 0 0;
    }
    
    #header h1 {
        font-size: 1.5rem;
    }
    
    #content {
        padding: 20px;
    }
    
    .stats-grid {
        grid-template-columns: 1fr;
    }
}
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">🔥 Wariblo Admin Premium</a></h1>
{% endblock %}
