services:
  - type: web
    name: wariblo
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn wariblo.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wariblo-db
          property: connectionString
      - key: SECRET_KEY
        generate: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: ENVIRONMENT
        value: "production"
      - key: CONTACT_EMAIL
        value: "afletounoudouprince5@gmail.com"
      - key: CONTACT_WHATSAPP
        value: "+22369549391"
      - key: CONTACT_PHONE
        value: "+22369549391"
      - key: USE_SUPABASE_STORAGE
        value: "True"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_S3_REGION_NAME
        value: "us-east-1"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"

databases:
  - name: wariblo-db
    databaseName: wariblo
    user: wariblo
